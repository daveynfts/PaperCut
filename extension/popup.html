<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lepton Wallet</title>
  <style>
    :root {
      --black: #0a0907;
      --white: #ffffff;
      --g50:  #f0f0f0;
      --g600: #484848;
      --g700: #303030;
      --g800: #1e1e1e;
      --g900: #111111;
      --accent: #e6b84c; /* Electrum Gold */
      --accent-dim: rgba(230, 184, 76, 0.08);
      --accent-border: rgba(230, 184, 76, 0.24);
      --font-mono: 'Courier New', Courier, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      background-color: var(--black);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 16px;
      border: 1px solid var(--g800);
    }

    /* Glassmorphism Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--g800);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand img {
      width: 20px;
      height: 20px;
    }

    .brand-name {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .status {
      font-size: 9px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    /* Card Wallet Info */
    .card {
      background: var(--g900);
      border: 1px solid var(--g800);
      border-radius: 4px;
      padding: 14px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-label {
      font-size: 9px;
      color: var(--g600);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .address {
      font-size: 11px;
      color: var(--g50);
      word-break: break-all;
      background: var(--black);
      padding: 6px;
      border-radius: 2px;
      border: 1px solid var(--g800);
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .address:hover {
      border-color: var(--accent-border);
    }

    .balance-container {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 10px;
    }

    .balance {
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
    }

    .balance-unit {
      font-size: 12px;
      color: var(--g50);
      margin-left: 4px;
    }

    /* Faucet & Settings Form */
    .btn {
      width: 100%;
      background: var(--accent);
      color: var(--black);
      border: none;
      padding: 8px;
      border-radius: 2px;
      font-weight: bold;
      font-family: var(--font-mono);
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-secondary {
      background: transparent;
      color: var(--g50);
      border: 1px solid var(--g800);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      font-size: 10px;
      color: var(--g600);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    input[type="number"] {
      flex: 1;
      background: var(--black);
      border: 1px solid var(--g800);
      color: var(--white);
      padding: 6px;
      border-radius: 2px;
      font-family: var(--font-mono);
    }

    input[type="number"]:focus {
      border-color: var(--accent-border);
      outline: none;
    }

    /* Transaction List */
    .tx-section {
      border-top: 1px solid var(--g800);
      padding-top: 12px;
      max-height: 120px;
      overflow-y: auto;
    }

    .tx-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 10px;
      border-bottom: 1px dashed var(--g800);
    }

    .tx-item:last-child {
      border-bottom: none;
    }

    .tx-title {
      color: var(--g50);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .tx-amount {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="icon.png" alt="Lepton">
      <span class="brand-name">LEPTON</span>
    </div>
    <span class="status">Arc L1</span>
  </header>

  <div class="card">
    <div class="card-label">Your Wallet Address (Click to Copy)</div>
    <div class="address" id="wallet-address" title="Click to copy">Loading...</div>
    
    <div class="card-label">USDC Balance</div>
    <div class="balance-container">
      <div>
        <span class="balance" id="wallet-balance">0.00</span>
        <span class="balance-unit">USDC</span>
      </div>
      <button class="btn btn-secondary" id="btn-faucet" style="width: auto; padding: 4px 8px; font-size: 10px; margin-top: 0;">Faucet</button>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="daily-limit">Daily Limit (USDC)</label>
    <div class="input-row">
      <input type="number" id="daily-limit" value="0.10" step="0.01" min="0.01">
      <button class="btn" id="btn-save-limit" style="width: auto; margin-top: 0; padding: 6px 12px;">Save</button>
    </div>
    <div style="font-size: 9px; color: var(--g600); margin-top: 4px; display: flex; justify-content: space-between;">
      <span>Spent today:</span>
      <span id="spent-today" style="color: var(--g50);">0.00 USDC</span>
    </div>
  </div>

  <div class="tx-section">
    <div class="card-label" style="margin-bottom: 6px;">Recent Readings</div>
    <div id="tx-list">
      <div style="font-size: 10px; color: var(--g600); text-align: center; padding: 10px 0;">No articles read yet.</div>
    </div>
  </div>

  <!-- Ethers UMD load -->
  <script src="ethers.umd.min.js"></script>
  <!-- Main Script -->
  <script src="popup.js"></script>
</body>
</html>
